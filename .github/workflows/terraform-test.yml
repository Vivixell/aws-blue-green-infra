name: Terraform Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# CRITICAL FOR OIDC: This permission block allows GitHub to request the temporary AWS token
permissions:
  id-token: write 
  contents: read  

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: terraform init
        working-directory: modules/webserver

      - name: Run Unit Tests
        run: terraform test
        working-directory: modules/webserver

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run the expensive/slow tests when code is actually merged to main
    if: github.event_name == 'push' 
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      # The Professional Standard: OIDC instead of hardcoded Access Keys
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: us-east-1

      - uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Run Integration Tests
        run: |
          go mod tidy
          # This explicitly targets ONLY the TestWebserverClusterIntegration function
          go test -v -timeout 45m -run TestWebserverClusterIntegration ./...
        working-directory: test

